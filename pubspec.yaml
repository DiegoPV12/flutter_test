name: products_catalog
description: "Flutter products catalog consuming DummyJSON API."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Architecture / DI / Routing
  flutter_modular: ^6.3.4

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # HTTP client
  dio: ^5.7.0

  # Local persistence
  shared_preferences: ^2.3.3

  # Image caching
  cached_network_image: ^3.4.1

  # Typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
